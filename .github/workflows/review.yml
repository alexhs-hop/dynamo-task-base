name: Dynamo Review (project-pays PoC)

# PROJECT-PAYS model: the review runs with the REPO OWNER's ANTHROPIC_API_KEY,
# via pull_request_target so it runs the BASE-branch workflow (which a fork PR
# cannot modify) and the contributor never holds the key.
#
# SAFETY: this workflow checks out the PR head READ-ONLY and never executes it.
# Do not add any step that builds or runs the submission (no npm/pip install in
# submission/, no running solve/tests) — that would run untrusted code with the
# project key in the environment.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dynamo-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base (rubric/prompt/scripts — trusted)
        uses: actions/checkout@v4

      - name: Checkout PR head (untrusted) read-only into submission/
        # Check out the PR's head commit via the base repo's pull ref
        # (refs/pull/<N>/head). This works for PRs from PRIVATE forks — the
        # base GITHUB_TOKEN can't read a contributor's private fork directly,
        # but it can read this ref, which mirrors the PR head into the base repo.
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          path: submission
          persist-credentials: false

      - name: Strip infra files from the submission (so only the task is reviewed; we never run them)
        run: rm -rf submission/.github submission/.dynamo submission/README.md

      - name: Static checks (free, deterministic — gate before the paid review)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .dynamo/static-report.sh submission

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code >/dev/null 2>&1

      - name: Run read-only review (project key)
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::Set the ANTHROPIC_API_KEY repo secret (this is the project-pays key)."
            exit 1
          fi
          claude -p \
            --model claude-sonnet-4-6 \
            --allowed-tools "Read,Glob,Grep" \
            --permission-mode bypassPermissions \
            < .dynamo/dynamo-eval-prompt.md \
            | tee "$RUNNER_TEMP/verdict.md"

      - name: Report + gate
        if: always() && steps.review.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .dynamo/report.sh "$RUNNER_TEMP/verdict.md"
